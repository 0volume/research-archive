<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Wiki</title>
  <link rel="stylesheet" href="./css/wiki.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  
  <div class="wiki-container">
    <header class="wiki-header">
      <a href="./index.html" class="wiki-logo">Research Wiki</a>
      <nav class="wiki-nav">
        <a href="./index.html">🏠 Home</a>
        <a href="https://github.com/0volume/research-archive" target="_blank">GitHub</a>
      </nav>
    </header>
    
    <aside class="wiki-sidebar">
      <div class="sidebar-section">
        <h3>📊 Statistics</h3>
        <div class="sidebar-stats">
          <div class="stat-box">
            <div class="stat-number" id="stat-topics">-</div>
            <div class="stat-label">Topics</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="stat-papers">-</div>
            <div class="stat-label">Papers</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="stat-complete">-</div>
            <div class="stat-label">Complete</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="stat-impl">-</div>
            <div class="stat-label">Implemented</div>
          </div>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>🏷️ Popular Tags</h3>
        <div class="key-findings" id="popular-tags">
          <span class="key-finding-tag">self-improvement</span>
          <span class="key-finding-tag">agents</span>
          <span class="key-finding-tag">reflection</span>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>🕐 Recent Updates</h3>
        <div class="recent-updates" id="sidebar-updates" style="background: transparent; border: none; padding: 0;">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>
    
    <main class="wiki-main" id="main" tabindex="-1">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading research wiki...</p>
      </div>
    </main>
  </div>
  
  <script type="module" src="./js/wiki.js"></script>
</body>
</html>
