<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Wiki // Cyberpunk</title>
  <link rel="stylesheet" href="./css/wiki.css">
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
</head>
<body>
  <div class="wiki-container">
    <header class="wiki-header cyber-header">
      <a href="./index.html" class="wiki-logo cyber-logo" data-text="RESEARCH_WIKI">
        <span class="logo-icon">◈</span> RESEARCH_WIKI
      </a>
      <button class="hamburger-menu" aria-label="Toggle navigation" onclick="toggleMobileNav()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="wiki-nav cyber-nav" id="main-nav">
        <a href="../index.html" class="wiki-nav-link">📚 RESEARCH</a>
        <a href="./index.html" class="active">🔍 WIKI</a>
        <a href="https://github.com/0volume/research-archive" target="_blank">GITHUB ⊞</a>
      </nav>
    </header>
    
    <aside class="wiki-sidebar">
      <div class="sidebar-section">
        <h3>// STATS</h3>
        <div class="sidebar-stats">
          <div class="stat-box">
            <div class="stat-number" id="stat-topics">-</div>
            <div class="stat-label">Topics</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="stat-papers">-</div>
            <div class="stat-label">Papers</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="stat-complete">-</div>
            <div class="stat-label">Complete</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="stat-impl">-</div>
            <div class="stat-label">Live</div>
          </div>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>// POPULAR_TAGS</h3>
        <div class="key-findings" id="popular-tags">
          <span class="key-finding-tag">self-improvement</span>
          <span class="key-finding-tag">agents</span>
          <span class="key-finding-tag">reflection</span>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>// RECENT_UPDATES</h3>
        <div class="recent-updates" id="sidebar-updates">
        </div>
      </div>
    </aside>
    
    <main class="wiki-main" id="main">
      <div class="loading">
        <div class="cyber-spinner"></div>
        <div class="decrypting-loader">
          <div class="decrypting-text" id="decrypting-text">DECRYPTING_DATA</div>
          <div class="decrypting-progress"></div>
          <div class="decrypting-status">ACCESSING_NEURAL_GRID...</div>
        </div>
      </div>
    </main>
    
    <script>
      // Decrypting text animation
      const decryptingText = document.getElementById('decrypting-text');
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
      const originalText = 'DECRYPTING_DATA';
      
      function animateDecrypt() {
        let iteration = 0;
        const maxIterations = 15;
        
        const interval = setInterval(() => {
          decryptingText.textContent = originalText
            .split('')
            .map((letter, index) => {
              if (index < iteration) {
                return originalText[index];
              }
              return chars[Math.floor(Math.random() * chars.length)];
            })
            .join('');
          
          if (iteration >= originalText.length) {
            clearInterval(interval);
          }
          
          iteration += 1 / 3;
        }, 30);
      }
      
      // Start animation
      animateDecrypt();
      
      // Repeat animation every 5 seconds while loading
      setInterval(() => {
        if (document.querySelector('.loading')) {
          animateDecrypt();
        }
      }, 5000);
    </script>
  </div>
  
  <script src="./js/wiki.js"></script>
  
  <script>
    // Mobile navigation toggle
    function toggleMobileNav() {
      const nav = document.getElementById('main-nav');
      const hamburger = document.querySelector('.hamburger-menu');
      nav.classList.toggle('active');
      hamburger.classList.toggle('active');
    }

    // Close mobile nav when clicking a link
    document.querySelectorAll('#main-nav a').forEach(link => {
      link.addEventListener('click', () => {
        const nav = document.getElementById('main-nav');
        const hamburger = document.querySelector('.hamburger-menu');
        nav.classList.remove('active');
        hamburger.classList.remove('active');
      });
    });
  </script>
  
  <!-- Scroll to Top Button -->
  <button class="scroll-to-top" id="scrollToTop" aria-label="Scroll to top">
    <span>▲</span>
  </button>
  
  <script>
    // Scroll to top button functionality
    const scrollBtn = document.getElementById('scrollToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        scrollBtn.classList.add('visible');
      } else {
        scrollBtn.classList.remove('visible');
      }
    });
    scrollBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
  
  <footer class="wiki-footer cyber-footer">
    <div class="cyber-footer-content">
        <span class="cyber-footer-brand">RESEARCH_WIKI</span>
        <nav class="cyber-footer-nav">
            <a href="../index.html">📚 Research</a>
            <a href="./index.html">🔍 Wiki</a>
            <a href="https://github.com/0volume/research-archive" target="_blank">GitHub ⊞</a>
        </nav>
        <span class="cyber-footer-status">● ONLINE</span>
    </div>
  </footer>
</body>
</html>
