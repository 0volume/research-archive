<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Archive - Down for Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 3rem;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 2rem;
            color: #ff6b6b;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #a0a0a0;
            margin-bottom: 1rem;
        }
        .date {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">⚠ MAINTENANCE</div>
        <h1>Research Archive</h1>
        <p>We're temporarily offline while we improve our research workflow and documentation processes.</p>
        <p>All research is now being stored locally. We'll be back with an improved experience soon.</p>
        <p class="date">Last updated: March 5, 2026</p>
    </div>
</body>
</html>
