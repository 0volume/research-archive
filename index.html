<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Research Archive</title>
    <link rel="stylesheet" href="wiki/css/cyberpunk.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <style>
        /* Global Cyberpunk Styles */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --neon-cyan: #00fff5;
            --neon-magenta: #ff00ff;
            --neon-orange: #ff6b35;
            --neon-green: #00ff88;
            --text-primary: #e0e0e0;
            --text-muted: #6b6b7b;
            --border-glow: rgba(0, 255, 245, 0.3);
        }

        body {
            font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 245, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 245, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 3px
            );
            opacity: 0.1;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header - Cyberpunk */
        header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 245, 0.1);
            position: relative;
        }

        header::before,
        header::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--neon-cyan);
            opacity: 0.6;
        }

        header::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }

        header::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 245, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Navigation */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-tab:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 245, 0.2);
        }

        .nav-tab.active {
            background: rgba(0, 255, 245, 0.15);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        /* Wiki Link - Special styling */
        .nav-tab.wiki-link {
            border-color: var(--neon-magenta);
            color: var(--neon-magenta);
        }

        .nav-tab.wiki-link:hover {
            background: rgba(255, 0, 255, 0.15);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        /* Sections */
        .section { display: none; }
        .section.active { display: block; }

        /* Meta bar */
        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .meta span {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .entry-count {
            color: var(--neon-cyan);
            font-weight: bold;
        }

        /* Filters */
        .filters-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .filter-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-right: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .filter-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 4px;
        }

        .filter-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .filter-btn.active {
            background: rgba(0, 255, 245, 0.15);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        /* Entry Cards */
        .entry {
            background: var(--bg-secondary);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            transition: all 0.3s ease;
        }

        .entry::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--neon-cyan);
            opacity: 0.6;
            border-radius: 8px 0 0 8px;
        }

        .entry:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 245, 0.15);
        }

        .entry.beginner::before { background: var(--neon-green); }
        .entry.intermediate::before { background: var(--neon-orange); }
        .entry.advanced::before { background: var(--neon-magenta); }

        .entry h3 {
            margin: 0 0 10px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .entry p {
            margin: 0 0 12px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Entry Meta */
        .entry-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .complexity-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .complexity-badge.beginner {
            background: rgba(0, 255, 136, 0.15);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .complexity-badge.intermediate {
            background: rgba(255, 107, 53, 0.15);
            color: var(--neon-orange);
            border: 1px solid var(--neon-orange);
        }

        .complexity-badge.advanced {
            background: rgba(255, 0, 255, 0.15);
            color: var(--neon-magenta);
            border: 1px solid var(--neon-magenta);
        }

        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            color: var(--neon-cyan);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 245, 0.2);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--neon-cyan);
            border-right-color: var(--neon-magenta);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-magenta); }

        /* Mobile */
        @media (max-width: 600px) {
            .container { padding: 16px; }
            h1 { font-size: 1.6rem; }
            .nav-tab { padding: 10px 16px; font-size: 0.8rem; }
            .entry { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Agent Research Archive</h1>
            <div class="subtitle">Research • Thoughts • Pitches</div>
        </header>

        <div class="nav-container">
            <button class="nav-tab active" data-tab="research">📚 Research</button>
            <button class="nav-tab" data-tab="thoughts">💭 Thoughts</button>
            <button class="nav-tab" data-tab="pitches">🎯 Pitches</button>
            <a href="wiki/" class="nav-tab wiki-link">🔍 Wiki</a>
        </div>

        <div id="research" class="section active">
            <div class="meta">
                <span>Category: <span id="category-count" class="entry-count">-</span></span>
                <span>Complexity: <span id="complexity-count" class="entry-count">-</span></span>
            </div>
            <div class="filters-row">
                <div class="filter-group">
                    <span class="filter-label">//complexity</span>
                    <button class="filter-btn active" data-filter="all">ALL</button>
                    <button class="filter-btn" data-filter="beginner">BEGINNER</button>
                    <button class="filter-btn" data-filter="intermediate">INTERMEDIATE</button>
                    <button class="filter-btn" data-filter="advanced">ADVANCED</button>
                </div>
            </div>
            <div id="research-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading research data...</p>
                </div>
            </div>
        </div>

        <div id="thoughts" class="section">
            <div class="meta">
                <span>Total Thoughts: <span id="thoughts-count" class="entry-count">-</span></span>
            </div>
            <div id="thoughts-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading thoughts...</p>
                </div>
            </div>
        </div>

        <div id="pitches" class="section">
            <div class="meta">
                <span>Stage: <span id="pitch-stage" class="entry-count">Staged reading notes (multi-day digestion)</span></span>
                <a href="https://github.com/0volume/research-archive/tree/main/notes" target="_blank" class="nav-tab" style="font-size: 0.75rem; padding: 6px 12px;">Browse notes →</a>
            </div>
            <div id="pitches-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading pitches...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.nav-tab[data-tab]').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterEntries(btn.dataset.filter);
            });
        });

        function filterEntries(level) {
            document.querySelectorAll('.entry').forEach(entry => {
                if (level === 'all' || entry.classList.contains(level)) {
                    entry.style.display = 'block';
                } else {
                    entry.style.display = 'none';
                }
            });
        }

        // Load data from GitHub JSON files
        async function loadData() {
            const baseUrl = 'https://raw.githubusercontent.com/0volume/research-archive/main/';
            
            try {
                // Load research
                const researchRes = await fetch(baseUrl + 'research.json');
                const researchData = await researchRes.json();
                renderResearch(researchData);
                
                // Load thoughts
                const thoughtsRes = await fetch(baseUrl + 'thoughts.json');
                const thoughtsData = await thoughtsRes.json();
                renderThoughts(thoughtsData);
                
                // Load pitches
                const pitchesRes = await fetch(baseUrl + 'pitches.json');
                const pitchesData = await pitchesRes.json();
                renderPitches(pitchesData);
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('research-list').innerHTML = '<p style="color: #ff6b35;">Error loading data. Please refresh.</p>';
            }
        }

        function renderResearch(data) {
            const container = document.getElementById('research-list');
            const categories = new Set();
            const complexities = new Set();
            
            let html = '';
            data.forEach((item, i) => {
                categories.add(item.category);
                complexities.add(item.complexity);
                html += `
                    <div class="entry ${item.complexity}">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                        <div class="entry-meta">
                            <span class="complexity-badge ${item.complexity}">${item.complexity}</span>
                            <span class="tag">${item.category}</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('category-count').textContent = categories.size;
            document.getElementById('complexity-count').textContent = complexities.size;
        }

        function renderThoughts(data) {
            const container = document.getElementById('thoughts-list');
            document.getElementById('thoughts-count').textContent = data.length;
            
            let html = '';
            data.slice(0, 10).forEach(item => {
                html += `
                    <div class="entry">
                        <h3>${item.title}</h3>
                        <p>${item.content.substring(0, 150)}...</p>
                        <div class="entry-meta">
                            <span class="tag">${item.type || 'thought'}</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html || '<p style="color: var(--text-muted);">No thoughts yet.</p>';
        }

        function renderPitches(data) {
            const container = document.getElementById('pitches-list');
            
            let html = '';
            data.forEach(item => {
                html += `
                    <div class="entry">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                        <div class="entry-meta">
                            <span class="complexity-badge ${item.status || 'pending'}">${item.status || 'pending'}</span>
                            <span class="tag">${item.priority || 'normal'} priority</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html || '<p style="color: var(--text-muted);">No pitches yet.</p>';
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
